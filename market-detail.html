<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oraklo | Detalle de mercado</title>
  <meta name="description" content="Detalle de mercado de Oraklo conectado a Supabase.">
  <link rel="stylesheet" href="styles.css?v=20260715-account3">
</head>
<body>
  <div class="app-shell">
    <header class="topbar" aria-label="Cabecera principal">
      <a class="brand" href="index.html" aria-label="Oraklo inicio">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">Oraklo</span>
      </a>

      <nav class="detail-nav" aria-label="Navegación de detalle">
        <a href="index.html">Volver a mercados</a>
        <a href="ranking.html">Clasificación</a>
        <a href="my-predictions.html">Mis predicciones</a>
        <a href="admin-resolution.html" data-admin-only hidden>Resolver mercados</a>
      </nav>

      <div class="topbar-actions detail-user-state" role="group" aria-label="Estado del usuario">
        <span class="karma-pill" role="status" aria-label="Karma disponible: 1.000">
          <span class="karma-symbol" aria-hidden="true">K</span>
          <strong data-profile-karma>1.000</strong>
        </span>
        <span class="user-stat-pill">Prestigio: <strong data-profile-prestige>0</strong></span>
        <span class="user-stat-pill">Rango: <strong data-profile-rank>Observador</strong></span>
        <button class="profile-button" type="button" data-auth-open data-auth-state="guest" data-profile-username aria-label="Entrar en Oraklo">Entrar</button>
        <button class="profile-button" type="button" data-auth-state="user" data-profile-username hidden aria-label="Usuario @Usuario">@Usuario</button>
        <button class="logout-button" type="button" data-auth-signout data-auth-state="user" hidden>Salir</button>
      </div>
    </header>

    <main id="market-detail-root" class="detail-page" aria-live="polite"></main>
  </div>

  <div class="modal-backdrop" id="prediction-modal" hidden>
    <section class="modal prediction-modal" role="dialog" aria-modal="true" aria-labelledby="prediction-modal-title" aria-describedby="prediction-modal-description">
      <button class="modal-close" id="prediction-modal-close" type="button" aria-label="Cerrar modal">×</button>
      <p class="eyebrow">Confirmación</p>
      <div class="modal-check" id="prediction-modal-check" hidden aria-hidden="true">✓</div>
      <h2 id="prediction-modal-title">Predicción</h2>
      <div id="prediction-modal-description" class="modal-summary"></div>
      <p class="prototype-warning">Prototipo sin dinero real.</p>
      <div class="modal-actions">
        <a class="primary-button" id="prediction-modal-primary" href="my-predictions.html" hidden>Ver mis predicciones</a>
        <button class="secondary-button" id="prediction-modal-ok" type="button">Cerrar</button>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js?v=20260715-account3"></script>
  <script src="auth.js?v=20260715-account3"></script>
  <script src="data.js?v=20260715-account3"></script>
  <script src="market-detail.js?v=20260715-account3"></script>
</body>
</html>
